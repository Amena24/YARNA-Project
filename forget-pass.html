<body class="font-body-md text-on-surface antialiased">
<!-- Transactional Shell: Navigation suppressed for focused recovery task -->
<main class="min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Logo Anchor -->
<header class="mb-12">
<img alt="Yarna Logo" class="w-40 mx-auto" data-alt="Yarna Logo." src="Images/logo.svg"/>
</header>
<!-- Recovery Card -->
<div class="w-full max-w-[480px] bg-white rounded-[32px] shadow-[0_8px_30px_rgb(138,75,42,0.06)] border border-outline-variant/30 overflow-hidden">
<!-- Texture Preview Image -->
<div class="h-48 w-full relative overflow-hidden">
<img alt="Soft Crochet Texture" class="w-full h-full object-cover" data-alt="A high-quality, macro close-up photograph of soft, organic cotton yarn in a warm terracotta hue. The lighting is diffused and natural, highlighting the intricate fibers and soft texture of the knitted pattern. The overall mood is nurturing and sophisticated, reflecting a tactile minimalism aesthetic with a clean, warm-toned color palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCpt9ORj0lNpg6H62yIov3cKqUw73TAFgu1llT1QZ-46-3xc8AS7PmPYPE8sawfj97R3AvCD28CufQ7VmvVb8u9pSkIadE0_scRDZe4-uVw8YWvw4Z1imOt2OFToJezgcYNNX-mYn_YDrmPSunYPln7zpXm_rDnb2aldzF55OglovSN6p-FuYtXCQI3ABYgwFMDGthmZ31EVFX72zT59E2Zv2H9OrvacMq6pGcdXRuk_sFylfEYC811ga6C9_LZLurvwQ20OVcItzM"/>
<div class="absolute inset-0 bg-gradient-to-t from-white via-transparent to-transparent"></div>
</div>
<!-- Content Area -->
<div class="px-8 pb-10 pt-4 text-center">
<div class="mb-6">
<h2 class="font-headline-lg text-headline-md text-on-surface mb-3">Recover Access</h2>
<p class="font-body-md text-on-surface-variant px-2">
                        Enter your email address and we'll send you a link to reset your password.
                    </p>
</div>
<form class="space-y-6 text-left">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">
                            Email Address
                        </label>
<input class="w-full px-4 py-3.5 rounded-xl border border-outline-variant bg-surface-container-low text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-tertiary/20 focus:border-tertiary transition-all duration-200" id="email" name="email" placeholder="hello@yarna.com" type="email"/>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-label-md text-body-md rounded-xl shadow-md hover:shadow-lg hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
                        Send Reset Link
                    </button>
</form>
<!-- Navigation Link Back -->
<div class="mt-8 pt-6 border-t border-surface-container">
<a class="inline-flex items-center gap-2 text-primary font-label-md hover:underline decoration-primary/30 underline-offset-4 transition-all group" href="#" id="backToSignin">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
                        Back to Sign In
                    </a>
</div>
</div>
</div>
<div id="toast"
  class="fixed top-6 right-6 z-[9999] hidden px-6 py-4 rounded-2xl shadow-xl bg-primary text-white font-semibold transition-all duration-300 opacity-0 translate-y-[-10px]">
</div>

            </p>
</footer>
