  <style>

      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

      box-shadow: 0 10px 30px -10px rgba(138, 75, 42, 0.08);
    }

      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 40px -15px rgba(138, 75, 42, 0.12);

<body class="bg-background text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
    <header class="flex fixed top-0 left-0 right-0 justify-between items-center px-10 py-2 bg-[#FBF9F4] shadow-sm dark:shadow-none z-50">
        <div class="w-[50px] h-[50px]"><img src="Images/logo.svg" alt="" class="w-full h-full"></div>
        <nav>
            <ul class="flex gap-6 text-[#53433C] font-medium ">
                <li class="font-medium hover:text-[#8A4B2A] hover:underline hover:underline-offset-8 transition duration-300 cursor-pointer"><a href="">Home</a></li>
                <li class="font-medium hover:text-[#8A4B2A] hover:underline hover:underline-offset-8 transition duration-300 cursor-pointer"><a href="">About</a></li>
                <li class="font-medium hover:text-[#8A4B2A] hover:underline hover:underline-offset-8 transition duration-300 cursor-pointer"><a href="">Products</a></li>
                <li class="font-medium hover:text-[#8A4B2A] hover:underline hover:underline-offset-8 transition duration-300 cursor-pointer"><a href="">Contact</a></li>

            </ul>
        </nav>
        <div class="flex items-center space-x-6">
<button class="hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">search</span>
</button>
<button class="relative hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">shopping_bag</span>
<span class="absolute -top-1 -right-1 bg-secondary text-white text-[10px] w-4 h-4  items-center justify-center rounded-full hidden"></span>
</button>
<img alt="Customer profile" class="w-8 h-8 rounded-full object-cover border-2 border-primary-fixed" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDucZvPd9jupmHQSBQiWt5sr5gj6uudYRICKRItjekKQEYIv14pg9owrbaxc5uDUMiTJjyY7pRaHVEbQI3Ot3NnwBuqe7PkjWd4vuyOCzAZwPB8PhUE-2wYIE_y4Svftvw7gi-o2gkNiEKitz1B8RWVq7ot2sds45KH9kxTwkCR9f38P9zpNJ81sRvnQ5Y97DAiYGhrO3qkLHSA3najcyIS1WMqP4ouWUypsWLylhtQ9zpwpfomNcan5G_A7HUZNBA0LasqdOVar9k"/>
</div>
</div>

<main class="pt-32 pb-section-gap px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">

  <!-- Hero & Category Header -->
  <div class="mb-12">
    <h2 class="font-headline-lg text-headline-lg text-on-surface mb-4">Curated Supplies</h2>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mb-8">
      Premium threads and precision tools chosen for the modern fiber artist. Each item is tested in our studio for quality and soul.
    </p>
    <!-- Category Tabs -->
    <div class="flex space-x-4 border-b border-surface-container-highest">
      <button onclick="filterByCategory('all')" class="tab-btn pb-4 font-label-md text-label-md text-primary border-b-2 border-primary transition-all px-2" data-category="all">All</button>
      <button onclick="filterByCategory('Crochet Threads')" class="tab-btn pb-4 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all px-2" data-category="Crochet Threads">Crochet Threads</button>
      <button onclick="filterByCategory('Crochet Needles')" class="tab-btn pb-4 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all px-2" data-category="Crochet Needles">Crochet Needles</button>
    </div>
  </div>

  <!-- Filters & Sorting -->
  <div class="flex flex-wrap items-center justify-between gap-4 mb-10">
    <div class="flex items-center gap-3">
      <span class="font-label-md text-label-md text-on-surface-variant">Filter by:</span>
      <div class="flex gap-2">
        <span onclick="filterByTag('Cotton')" class="filter-tag px-4 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-outline-variant cursor-pointer hover:bg-secondary-container hover:text-on-secondary-container transition-colors" data-tag="Cotton">Cotton</span>
        <span onclick="filterByTag('Silk Blend')" class="filter-tag px-4 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-outline-variant cursor-pointer hover:bg-secondary-container hover:text-on-secondary-container transition-colors" data-tag="Silk Blend">Silk Blend</span>
        <span onclick="filterByTag('Organic')" class="filter-tag px-4 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-outline-variant cursor-pointer hover:bg-secondary-container hover:text-on-secondary-container transition-colors" data-tag="Organic">Organic</span>
      </div>
    </div>
    <select id="sort-select" onchange="sortProducts()" class="bg-surface-container border-none rounded-xl font-label-md text-label-md px-6 py-2 focus:ring-2 focus:ring-tertiary-fixed transition-all text-on-surface-variant">
      <option value="newest">Sort by: Newest</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
  </div>

  <!-- Product Grid -->
  <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
    <!-- Cards are injected here by JS -->
  </div>

  <!-- Pagination -->
  <div id="pagination-container" class="mt-section-gap flex justify-center items-center gap-4">
    <!-- Pagination will be injected here by JS -->
  </div>

</main>

<script>
  // ── State ──────────────────────────────────────────────────
  let activeCategory = 'all';
  let activeTag = null;
  let quantities = {};   // { productId: count }
  let currentPage = 1;
  let productColorIndices = {}; // Track selected color index for each product
  const productsPerPage = 6;

  // Initialise quantities and color indices
  products.forEach(p => {
    quantities[p.id] = 1;
    productColorIndices[p.id] = p.activeColorIndex || 0;
  });

  // ── Filter & Sort Logic ────────────────────────────────────
  function getFilteredAndSortedProducts() {
    let filtered = [...products];

    if (activeCategory !== 'all') {
      filtered = filtered.filter(p => p.category === activeCategory);
    }
    if (activeTag) {
      filtered = filtered.filter(p => p.filters && p.filters.includes(activeTag));
    }

    const sortValue = document.getElementById('sort-select').value;
    if (sortValue === 'price-asc')  filtered.sort((a, b) => a.price - b.price);
    if (sortValue === 'price-desc') filtered.sort((a, b) => b.price - a.price);

    return filtered;
  }

  // ── Pagination ─────────────────────────────────────────────
  function getPaginatedProducts(products_array) {
    const start = (currentPage - 1) * productsPerPage;
    const end = start + productsPerPage;
    return products_array.slice(start, end);
  }

  function renderPagination(totalProducts) {
    const totalPages = Math.ceil(totalProducts / productsPerPage);
    const paginationContainer = document.getElementById('pagination-container');
    
    if (!paginationContainer) return;
    
    if (totalPages <= 1) {
      paginationContainer.innerHTML = '';
      return;
    }
    
    // Build pagination HTML
    let paginationHtml = `
      <button onclick="goToPage(${currentPage - 1})" class="prev-btn w-12 h-12 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant ${currentPage === 1 ? 'opacity-50 cursor-not-allowed' : ''}" ${currentPage === 1 ? 'disabled' : ''}>
        <span class="material-symbols-outlined">chevron_left</span>
      </button>
      <div class="flex items-center gap-2">
    `;
    
    for (let i = 1; i <= totalPages; i++) {
      paginationHtml += `
        <button onclick="goToPage(${i})" class="page-btn w-10 h-10 rounded-full ${currentPage === i ? 'bg-primary text-white' : 'hover:bg-surface-container transition-colors text-on-surface-variant'} font-label-md text-label-md">
          ${i}
        </button>
      `;
    }
    
    paginationHtml += `
      </div>
      <button onclick="goToPage(${currentPage + 1})" class="next-btn w-12 h-12 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant ${currentPage === totalPages ? 'opacity-50 cursor-not-allowed' : ''}" ${currentPage === totalPages ? 'disabled' : ''}>
        <span class="material-symbols-outlined">chevron_right</span>
      </button>
    `;
    
    paginationContainer.innerHTML = paginationHtml;
  }

  function goToPage(page) {
    const filtered = getFilteredAndSortedProducts();
    const totalPages = Math.ceil(filtered.length / productsPerPage);
    
    if (page < 1 || page > totalPages) return;
    
    currentPage = page;
    renderProducts();
    
    // Smooth scroll to top of product grid
    document.getElementById('product-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Color Switching ────────────────────────────────────────
  function changeColor(productId, colorIndex, colorValue) {
    productColorIndices[productId] = colorIndex;
    
    // Update the image source
    const product = products.find(p => p.id === productId);
    if (product && product.images) {
      const imgElement = document.getElementById(`product-img-${productId}`);
      if (imgElement && product.images[colorValue]) {
        imgElement.src = product.images[colorValue];
      }
    }
    
    // Update the ring styles on color swatches
    const swatchContainer = document.getElementById(`swatches-${productId}`);
    if (swatchContainer) {
      const swatches = swatchContainer.querySelectorAll('.color-swatch');
      swatches.forEach((swatch, idx) => {
        if (idx === colorIndex) {
          swatch.classList.add('ring-2', 'ring-primary', 'ring-offset-2');
        } else {
          swatch.classList.remove('ring-2', 'ring-primary', 'ring-offset-2');
        }
      });
    }
  }

  // ── Render ─────────────────────────────────────────────────
  function renderProducts() {
    const filtered = getFilteredAndSortedProducts();
    const totalProducts = filtered.length;
    const paginatedProducts = getPaginatedProducts(filtered);
    
    const grid = document.getElementById('product-grid');
    grid.innerHTML = paginatedProducts.length
      ? paginatedProducts.map(p => buildCard(p)).join('')
      : '<p class="col-span-3 text-center text-on-surface-variant font-body-md text-body-md py-16">No products found.</p>';
    
    renderPagination(totalProducts);
  }

  function buildCard(p) {
    // Badge HTML
    let badgeHtml = '';
    if (p.badge) {
      let bgColor = '';
      switch(p.badge.color) {
        case 'primary': bgColor = '#8a4b2a'; break;
        case 'secondary': bgColor = '#7d525f'; break;
        case 'tertiary': bgColor = '#54603f'; break;
        default: bgColor = '#8a4b2a';
      }
      badgeHtml = `<span class="absolute top-4 ${p.badge.position === 'right' ? 'right-4' : 'left-4'} text-white font-label-sm text-label-sm px-3 py-1 rounded-full" style="background-color: ${bgColor}">${p.badge.text}</span>`;
    }

    // Get current image based on selected color
    let currentImage = p.image || '';
    let currentColorIndex = productColorIndices[p.id] || 0;
    
    if (p.images && p.colors && p.colors[currentColorIndex]) {
      const currentColor = p.colors[currentColorIndex];
      currentImage = p.images[currentColor] || p.image || '';
    } else if (p.images && p.colors) {
      // Fallback to first color
      currentImage = p.images[p.colors[0]] || p.image || '';
    }

    // Color swatches (threads) or size badge (needles)
    let bottomDetail = '';
    if (p.colors && p.images) {
      const swatches = p.colors.map((c, i) => {
        const isActive = i === currentColorIndex;
        const borderStyle = c === '#fbf9f4' ? 'border:1px solid #d8c2b9;' : '';
        return `
          <div 
            class="color-swatch w-8 h-8 rounded-full cursor-pointer transition-transform hover:scale-110 ${isActive ? 'ring-2 ring-primary ring-offset-2' : ''}"
            style="background-color: ${c}; ${borderStyle}"
            onclick="changeColor(${p.id}, ${i}, '${c}')"
          ></div>
        `;
      }).join('');
      bottomDetail = `
        <div id="swatches-${p.id}" class="flex gap-2 mb-6">
          ${swatches}
        </div>
      `;
    } else if (p.size) {
      bottomDetail = `<div class="mb-3"><span class="font-label-md text-label-md text-secondary bg-secondary-fixed px-2 py-0.5 rounded">Size: ${p.size}</span></div>`;
    }

    return `
      <div class="bg-white rounded-[24px] p-4 soft-shadow card-hover transition-all duration-300 flex flex-col border border-surface-container">
        <div class="relative rounded-[20px] overflow-hidden mb-4 aspect-[4/5] bg-surface-container-low">
          <img id="product-img-${p.id}" class="w-full h-full object-cover transition-opacity duration-300" src="${currentImage}" alt="${p.imageAlt}" loading="lazy"/>
          ${badgeHtml}
        </div>
        <div class="px-2 flex-grow">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-headline-md text-headline-md text-on-surface">${p.name}</h3>
            <span class="font-headline-md text-headline-md text-primary">$${p.price.toFixed(2)}</span>
          </div>
          <p class="font-body-md text-body-md text-on-surface-variant mb-4 line-clamp-2">${p.description}</p>
          ${bottomDetail}
        </div>
        <div class="px-2 pb-2 flex items-center justify-between gap-4">
          <div class="flex items-center bg-surface-container rounded-full px-3 py-1 border border-outline-variant">
            <button onclick="changeQty(${p.id}, -1)" class="p-1 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[18px]">remove</span>
            </button>
            <span id="qty-${p.id}" class="mx-4 font-label-md text-label-md">${quantities[p.id]}</span>
            <button onclick="changeQty(${p.id}, 1)" class="p-1 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[18px]">add</span>
            </button>
          </div>
          <button onclick="addToCart(${p.id})" class="flex-grow bg-primary text-white font-label-md text-label-md py-3 px-6 rounded-full hover:bg-primary-container transition-all flex items-center justify-center gap-2 active:scale-95">
            <span class="material-symbols-outlined text-[20px]">shopping_cart</span>
            Add to Cart
          </button>
        </div>
      </div>`;
  }

  // ── Interactivity ──────────────────────────────────────────
  function changeQty(id, delta) {
    quantities[id] = Math.max(1, (quantities[id] || 1) + delta);
    const el = document.getElementById(`qty-${id}`);
    if (el) el.textContent = quantities[id];
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    const selectedColorIndex = productColorIndices[id];
    const selectedColor = product.colors ? product.colors[selectedColorIndex] : null;
    const colorName = selectedColor ? ` (${selectedColor})` : '';
    if (product) alert(`Added ${quantities[id]}× "${product.name}"${colorName} to cart!`);
  }

  function filterByCategory(cat) {
    activeCategory = cat;
    activeTag = null;
    currentPage = 1;

    // Update tab styles
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const isActive = btn.dataset.category === cat;
      if (isActive) {
        btn.classList.add('text-primary', 'border-b-2', 'border-primary');
        btn.classList.remove('text-on-surface-variant');
      } else {
        btn.classList.remove('text-primary', 'border-b-2', 'border-primary');
        btn.classList.add('text-on-surface-variant');
      }
    });

    // Reset filter tags
    document.querySelectorAll('.filter-tag').forEach(t => {
      t.classList.remove('bg-secondary-container', 'text-on-secondary-container');
      t.classList.add('bg-surface-container', 'text-on-surface-variant');
    });

    renderProducts();
  }

  function filterByTag(tag) {
    activeTag = activeTag === tag ? null : tag;
    currentPage = 1;

    document.querySelectorAll('.filter-tag').forEach(t => {
      const isActive = t.dataset.tag === activeTag;
      if (isActive) {
        t.classList.add('bg-secondary-container', 'text-on-secondary-container');
        t.classList.remove('bg-surface-container', 'text-on-surface-variant');
      } else {
        t.classList.remove('bg-secondary-container', 'text-on-secondary-container');
        t.classList.add('bg-surface-container', 'text-on-surface-variant');
      }
    });

    renderProducts();
  }

  function sortProducts() {
    currentPage = 1;
    renderProducts();
  }

  // ── Init ───────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    renderProducts();
  });
</script>
