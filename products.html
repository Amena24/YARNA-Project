<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Stitch &amp; Soul | Crochet Studio Products</title>
  <script src="products.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Literata:wght@600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-tertiary-container": "#faffe9",
            "tertiary": "#54603f",
            "error": "#ba1a1a",
            "tertiary-container": "#6c7956",
            "on-primary-fixed-variant": "#703718",
            "surface": "#fbf9f4",
            "secondary": "#7d525f",
            "surface-container": "#f0eee9",
            "error-container": "#ffdad6",
            "on-tertiary-fixed-variant": "#3f4b2c",
            "outline-variant": "#d8c2b9",
            "tertiary-fixed-dim": "#becca3",
            "primary-fixed": "#ffdbcb",
            "on-background": "#1b1c19",
            "secondary-fixed-dim": "#eeb8c7",
            "on-error": "#ffffff",
            "surface-container-low": "#f5f3ee",
            "on-tertiary": "#ffffff",
            "inverse-surface": "#30312e",
            "on-surface": "#1b1c19",
            "surface-container-lowest": "#ffffff",
            "on-secondary": "#ffffff",
            "on-primary-container": "#fffbff",
            "on-secondary-fixed-variant": "#623b47",
            "primary-fixed-dim": "#ffb693",
            "primary": "#8a4b2a",
            "primary-container": "#a86340",
            "on-primary": "#ffffff",
            "outline": "#86736b",
            "on-surface-variant": "#53433c",
            "on-tertiary-fixed": "#141f05",
            "secondary-fixed": "#ffd9e2",
            "surface-container-highest": "#e4e2dd",
            "surface-dim": "#dbdad5",
            "on-secondary-fixed": "#30111c",
            "secondary-container": "#fdc6d4",
            "inverse-primary": "#ffb693",
            "on-primary-fixed": "#341000",
            "surface-bright": "#fbf9f4",
            "tertiary-fixed": "#dae8be",
            "on-secondary-container": "#7a505c",
            "surface-container-high": "#eae8e3",
            "surface-tint": "#8d4e2d",
            "on-error-container": "#93000a",
            "background": "#fbf9f4",
            "surface-variant": "#e4e2dd",
            "inverse-on-surface": "#f2f1ec"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "container-max": "1280px",
            "section-gap": "80px",
            "margin-mobile": "16px",
            "margin-desktop": "40px",
            "gutter": "24px",
            "unit": "8px"
          },
          "fontFamily": {
            "label-sm": ["Plus Jakarta Sans"],
            "label-md": ["Plus Jakarta Sans"],
            "body-lg": ["Plus Jakarta Sans"],
            "display-lg": ["Literata"],
            "headline-lg": ["Literata"],
            "headline-lg-mobile": ["Literata"],
            "body-md": ["Plus Jakarta Sans"],
            "headline-md": ["Literata"]
          },
          "fontSize": {
            "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
            "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "headline-lg-mobile": ["28px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .soft-shadow {
      box-shadow: 0 10px 30px -10px rgba(138, 75, 42, 0.08);
    }
    .card-hover:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 40px -15px rgba(138, 75, 42, 0.12);
    }
  </style>
</head>
<body class="bg-background text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">

<main class="pt-32 pb-section-gap px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">

  <!-- Hero & Category Header -->
  <div class="mb-12">
    <h2 class="font-headline-lg text-headline-lg text-on-surface mb-4">Curated Supplies</h2>
    <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mb-8">
      Premium threads and precision tools chosen for the modern fiber artist. Each item is tested in our studio for quality and soul.
    </p>
    <!-- Category Tabs -->
    <div class="flex space-x-4 border-b border-surface-container-highest">
      <button onclick="filterByCategory('all')" class="tab-btn pb-4 font-label-md text-label-md text-primary border-b-2 border-primary transition-all px-2" data-category="all">All</button>
      <button onclick="filterByCategory('Crochet Threads')" class="tab-btn pb-4 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all px-2" data-category="Crochet Threads">Crochet Threads</button>
      <button onclick="filterByCategory('Crochet Needles')" class="tab-btn pb-4 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all px-2" data-category="Crochet Needles">Crochet Needles</button>
      <button onclick="filterByCategory('Pattern Kits')" class="tab-btn pb-4 font-label-md text-label-md text-on-surface-variant hover:text-primary transition-all px-2" data-category="Pattern Kits">Pattern Kits</button>
    </div>
  </div>

  <!-- Filters & Sorting -->
  <div class="flex flex-wrap items-center justify-between gap-4 mb-10">
    <div class="flex items-center gap-3">
      <span class="font-label-md text-label-md text-on-surface-variant">Filter by:</span>
      <div class="flex gap-2">
        <span onclick="filterByTag('Cotton')" class="filter-tag px-4 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-outline-variant cursor-pointer hover:bg-secondary-container hover:text-on-secondary-container transition-colors" data-tag="Cotton">Cotton</span>
        <span onclick="filterByTag('Silk Blend')" class="filter-tag px-4 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-outline-variant cursor-pointer hover:bg-secondary-container hover:text-on-secondary-container transition-colors" data-tag="Silk Blend">Silk Blend</span>
        <span onclick="filterByTag('Organic')" class="filter-tag px-4 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-outline-variant cursor-pointer hover:bg-secondary-container hover:text-on-secondary-container transition-colors" data-tag="Organic">Organic</span>
      </div>
    </div>
    <select id="sort-select" onchange="sortProducts()" class="bg-surface-container border-none rounded-xl font-label-md text-label-md px-6 py-2 focus:ring-2 focus:ring-tertiary-fixed transition-all text-on-surface-variant">
      <option value="newest">Sort by: Newest</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
    </select>
  </div>

  <!-- Product Grid -->
  <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter">
    <!-- Cards are injected here by JS -->
  </div>

  <!-- Pagination -->
  <div class="mt-section-gap flex justify-center items-center gap-4">
    <button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant">
      <span class="material-symbols-outlined">chevron_left</span>
    </button>
    <div class="flex items-center gap-2">
      <button class="w-10 h-10 rounded-full bg-primary text-white font-label-md text-label-md">1</button>
      <button class="w-10 h-10 rounded-full hover:bg-surface-container transition-colors font-label-md text-label-md text-on-surface-variant">2</button>
      <button class="w-10 h-10 rounded-full hover:bg-surface-container transition-colors font-label-md text-label-md text-on-surface-variant">3</button>
    </div>
    <button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant">
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>

</main>

<script>
  // ── State ──────────────────────────────────────────────────
  let activeCategory = 'all';
  let activeTag = null;
  let quantities = {};   // { productId: count }

  // Initialise quantities
  products.forEach(p => quantities[p.id] = 1);

  // ── Render ─────────────────────────────────────────────────
  function renderProducts() {
    let filtered = [...products];

    if (activeCategory !== 'all') {
      filtered = filtered.filter(p => p.category === activeCategory);
    }
    if (activeTag) {
      filtered = filtered.filter(p => p.filters && p.filters.includes(activeTag));
    }

    const sortValue = document.getElementById('sort-select').value;
    if (sortValue === 'price-asc')  filtered.sort((a, b) => a.price - b.price);
    if (sortValue === 'price-desc') filtered.sort((a, b) => b.price - a.price);

    const grid = document.getElementById('product-grid');
    grid.innerHTML = filtered.length
      ? filtered.map(p => buildCard(p)).join('')
      : '<p class="col-span-3 text-center text-on-surface-variant font-body-md text-body-md py-16">No products found.</p>';
  }

  function buildCard(p) {
    // Badge HTML
    const badgeHtml = p.badge
      ? `<span class="absolute top-4 ${p.badge.position === 'right' ? 'right-4' : 'left-4'} bg-${p.badge.color} text-white font-label-sm text-label-sm px-3 py-1 rounded-full">${p.badge.text}</span>`
      : '';

    // Color swatches (threads) or size badge (needles)
    let bottomDetail = '';
    if (p.colors) {
      const swatches = p.colors.map((c, i) => {
        const isActive = i === (p.activeColorIndex ?? 0);
        return `<div class="w-6 h-6 rounded-full ${isActive ? 'ring-2 ring-primary ring-offset-2' : 'hover:scale-110'} transition-transform cursor-pointer" style="background-color:${c}; ${c === '#fbf9f4' ? 'border:1px solid #d8c2b9;' : ''}"></div>`;
      }).join('');
      bottomDetail = `<div class="flex gap-2 mb-6">${swatches}</div>`;
    } else if (p.size) {
      bottomDetail = `<div class="mb-3"><span class="font-label-md text-label-md text-secondary bg-secondary-fixed px-2 py-0.5 rounded">Size: ${p.size}</span></div>`;
    }

    return `
      <div class="bg-white rounded-[24px] p-4 soft-shadow card-hover transition-all duration-300 flex flex-col border border-surface-container">
        <div class="relative rounded-[20px] overflow-hidden mb-4 aspect-[4/5] bg-surface-container-low">
          <img class="w-full h-full object-cover" src="${p.image}" alt="${p.imageAlt}" loading="lazy"/>
          ${badgeHtml}
        </div>
        <div class="px-2 flex-grow">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-headline-md text-headline-md text-on-surface">${p.name}</h3>
            <span class="font-headline-md text-headline-md text-primary">$${p.price.toFixed(2)}</span>
          </div>
          <p class="font-body-md text-body-md text-on-surface-variant mb-4 line-clamp-2">${p.description}</p>
          ${bottomDetail}
        </div>
        <div class="px-2 pb-2 flex items-center justify-between gap-4">
          <div class="flex items-center bg-surface-container rounded-full px-3 py-1 border border-outline-variant">
            <button onclick="changeQty(${p.id}, -1)" class="p-1 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[18px]">remove</span>
            </button>
            <span id="qty-${p.id}" class="mx-4 font-label-md text-label-md">${quantities[p.id]}</span>
            <button onclick="changeQty(${p.id}, 1)" class="p-1 hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[18px]">add</span>
            </button>
          </div>
          <button onclick="addToCart(${p.id})" class="flex-grow bg-primary text-white font-label-md text-label-md py-3 px-6 rounded-full hover:bg-primary-container transition-all flex items-center justify-center gap-2 active:scale-95">
            <span class="material-symbols-outlined text-[20px]">shopping_cart</span>
            Add to Cart
          </button>
        </div>
      </div>`;
  }

  // ── Interactivity ──────────────────────────────────────────
  function changeQty(id, delta) {
    quantities[id] = Math.max(1, (quantities[id] || 1) + delta);
    const el = document.getElementById(`qty-${id}`);
    if (el) el.textContent = quantities[id];
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (product) alert(`Added ${quantities[id]}× "${product.name}" to cart!`);
  }

  function filterByCategory(cat) {
    activeCategory = cat;
    activeTag = null;

    // Update tab styles
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const isActive = btn.dataset.category === cat;
      btn.classList.toggle('text-primary', isActive);
      btn.classList.toggle('border-b-2', isActive);
      btn.classList.toggle('border-primary', isActive);
      btn.classList.toggle('text-on-surface-variant', !isActive);
    });

    // Reset filter tags
    document.querySelectorAll('.filter-tag').forEach(t => {
      t.classList.remove('bg-secondary-container', 'text-on-secondary-container');
      t.classList.add('bg-surface-container', 'text-on-surface-variant');
    });

    renderProducts();
  }

  function filterByTag(tag) {
    activeTag = activeTag === tag ? null : tag;

    document.querySelectorAll('.filter-tag').forEach(t => {
      const isActive = t.dataset.tag === activeTag;
      t.classList.toggle('bg-secondary-container', isActive);
      t.classList.toggle('text-on-secondary-container', isActive);
      t.classList.toggle('bg-surface-container', !isActive);
      t.classList.toggle('text-on-surface-variant', !isActive);
    });

    renderProducts();
  }

  function sortProducts() {
    renderProducts();
  }

  // ── Init ───────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', renderProducts);
</script>

</body>
</html>
